# SQLi Detection Rules
# Format: name|type|pattern|severity
#
# Types:
#   KEYWORD  – case-insensitive substring match
#   REGEX    – POSIX extended regex (case-insensitive)
#
# Severities: LOW, MEDIUM, HIGH, CRITICAL
#
# ---------------------------------------------------------------------------
# Classic UNION-based injection
# ---------------------------------------------------------------------------
UNION_SELECT|KEYWORD|union select|CRITICAL
UNION_ALL_SELECT|KEYWORD|union all select|CRITICAL

# ---------------------------------------------------------------------------
# Tautology / Boolean injection
# ---------------------------------------------------------------------------
OR_TAUTOLOGY|REGEX|or\s+[0-9]+=\s*[0-9]+|HIGH
AND_TAUTOLOGY|REGEX|and\s+[0-9]+=\s*[0-9]+|HIGH
OR_ONE_EQUALS_ONE|KEYWORD|or 1=1|HIGH
OR_TRUE|KEYWORD|or true|MEDIUM
OR_A_EQUALS_A|REGEX|or\s+'[^']*'\s*=\s*'[^']*'|HIGH

# ---------------------------------------------------------------------------
# Stacked queries / batch execution
# ---------------------------------------------------------------------------
STACKED_QUERY|REGEX|;\s*(select|insert|update|delete|drop|create|alter|exec)|HIGH

# ---------------------------------------------------------------------------
# Comment sequences used to strip or split queries
# ---------------------------------------------------------------------------
INLINE_COMMENT|KEYWORD|/**/|MEDIUM
MYSQL_VER_COMMENT|REGEX|/\*!|MEDIUM
LINE_COMMENT|REGEX|--\s|MEDIUM
HASH_COMMENT|KEYWORD|#|LOW

# ---------------------------------------------------------------------------
# Encoded / obfuscated forms
# ---------------------------------------------------------------------------
URL_ENCODED_QUOTE|KEYWORD|%27|MEDIUM
URL_ENCODED_SPACE|KEYWORD|%20|LOW
HEX_STRING|REGEX|0x[0-9a-f]{4,}|MEDIUM
CHAR_FUNCTION|REGEX|char\s*\(|MEDIUM

# ---------------------------------------------------------------------------
# Sensitive PostgreSQL / ANSI information schema targets
# ---------------------------------------------------------------------------
INFORMATION_SCHEMA|KEYWORD|information_schema|HIGH
PG_SHADOW|KEYWORD|pg_shadow|CRITICAL
PG_USER|KEYWORD|pg_user|HIGH
PG_ROLES|KEYWORD|pg_roles|HIGH
PG_TABLES|KEYWORD|pg_tables|MEDIUM
PG_STAT_ACTIVITY|KEYWORD|pg_stat_activity|HIGH

# ---------------------------------------------------------------------------
# DB server version / metadata probes
# ---------------------------------------------------------------------------
VERSION_PROBE|KEYWORD|@@version|HIGH
VERSION_FUNC|REGEX|version\s*\(\s*\)|MEDIUM
CURRENT_USER|KEYWORD|current_user|MEDIUM
SESSION_USER|KEYWORD|session_user|MEDIUM

# ---------------------------------------------------------------------------
# Time-based blind injection helpers
# ---------------------------------------------------------------------------
PG_SLEEP|KEYWORD|pg_sleep|HIGH
WAITFOR|KEYWORD|waitfor delay|HIGH

# ---------------------------------------------------------------------------
# File read / write (PostgreSQL)
# ---------------------------------------------------------------------------
PG_READ_FILE|KEYWORD|pg_read_file|CRITICAL
COPY_TO_FILE|REGEX|copy\s+\S+\s+to\s+'/|CRITICAL
COPY_FROM_FILE|REGEX|copy\s+\S+\s+from\s+'/|CRITICAL

# ---------------------------------------------------------------------------
# Privilege escalation helpers
# ---------------------------------------------------------------------------
DROP_TABLE|REGEX|drop\s+table|HIGH
ALTER_USER|REGEX|alter\s+(user|role)|HIGH
GRANT_ALL|REGEX|grant\s+all|HIGH

# ---------------------------------------------------------------------------
# Suspicious meta-function calls
# ---------------------------------------------------------------------------
EXEC_COMMAND|REGEX|(dblink|lo_export|lo_import)\s*\(|CRITICAL
