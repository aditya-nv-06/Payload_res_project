# config/network.conf
# Network monitoring configuration for pqCheck
#
# This file allows you to:
#   - Specify which PostgreSQL ports to monitor (instead of hardcoded 5432)
#   - Specify which destination IPs to monitor (optional)
#   - Override the default alert output path
#
# Format: key=value, one per line
# Lines starting with '#' are comments

# TCP ports where PostgreSQL is listening (comma-separated)
# Default: 543-auto or similar2
ports=5432

# Destination IP addresses to monitor (optional, comma-separated)
# If omitted, all destination IPs are monitored
# Examples: 10.0.0.5 or 10.0.0.5,192.168.1.100
# ips=10.0.0.5

# Output file path (optional, can override CLI -o flag)
# If omitted, uses the path specified by -o or default alerts.jsonl
# output_path=/var/log/pqcheck/alerts.jsonl
