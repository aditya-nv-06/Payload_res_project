name: pqCheck Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  system-audit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_CONNSTR: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=postgres sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcap-dev libpq-dev python3

      - name: Build pqCheck
        run: make -B

      - name: Run audit gate
        run: make audit-ci PG_CONNSTR="$PG_CONNSTR"
