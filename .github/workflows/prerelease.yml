name: pqCheck Pre-Release

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          mkdir -p dist
          LAST_TAG="$(git tag --sort=-creatordate | head -n 1 || true)"
          CURRENT_REF="${GITHUB_REF_NAME}"

          {
            echo "# pqCheck pre-release ${CURRENT_REF}"
            echo
            if [ -n "$LAST_TAG" ]; then
              echo "## Changes since ${LAST_TAG}"
              git log --no-merges --pretty=format:'- %s (%h)' "${LAST_TAG}..HEAD"
            else
              echo "## Recent changes"
              git log -n 20 --no-merges --pretty=format:'- %s (%h)'
            fi
          } > dist/CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: prerelease-changelog
          path: dist/CHANGELOG.md

  source-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          mkdir -p dist
          tar -czf dist/pqCheck-source.tar.gz \
            --exclude=.git \
            --exclude=dist \
            --exclude=pqCheck \
            .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: prerelease-source-archive
          path: dist/pqCheck-source.tar.gz

  packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - format: deb
            script: packaging/build-deb.sh
            artifact_name: prerelease-pqcheck-deb
            package_glob: pqcheck_1.0.0_amd64.deb
          - format: rpm
            script: packaging/build-rpm.sh
            artifact_name: prerelease-pqcheck-rpm
            package_glob: pqcheck-1.0.0-1.x86_64.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcap-dev libpq-dev libncurses-dev ruby-dev python3 tar gzip
          sudo gem install --no-document fpm

      - name: Build full-featured binary
        run: make -B WITH_LIBPQ=1 WITH_TUI=1

      - name: Build package
        run: bash ${{ matrix.script }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_glob }}

  publish-prerelease:
    runs-on: ubuntu-latest
    needs:
      - changelog
      - source-archive
      - packages

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Prepare release notes
        run: |
          mkdir -p dist
          cp dist/artifacts/prerelease-changelog/CHANGELOG.md dist/RELEASE_NOTES.md

      - name: Publish draft pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-${{ github.ref_name }}-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: true
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/artifacts/prerelease-source-archive/pqCheck-source.tar.gz
            dist/artifacts/prerelease-pqcheck-deb/pqcheck_1.0.0_amd64.deb
            dist/artifacts/prerelease-pqcheck-rpm/pqcheck-1.0.0-1.x86_64.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
