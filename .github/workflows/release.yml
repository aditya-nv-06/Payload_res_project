name: pqCheck Release

on:
  push:
    tags:
      - "v*"

jobs:
  changelog:
    runs-on: ubuntu-latest

    outputs:
      changelog_path: ${{ steps.write.outputs.changelog_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: write
        run: |
          mkdir -p dist
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git tag --sort=-creatordate | grep -vx "$CURRENT_TAG" | head -n 1 || true)"

          {
            echo "# pqCheck ${CURRENT_TAG}"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since ${PREV_TAG}"
              git log --no-merges --pretty=format:'- %s (%h)' "${PREV_TAG}..${CURRENT_TAG}"
            else
              echo "## Changes in this release"
              git log --no-merges --pretty=format:'- %s (%h)' "${CURRENT_TAG}^..${CURRENT_TAG}" || true
            fi
          } > dist/CHANGELOG.md

          echo "changelog_path=dist/CHANGELOG.md" >> "$GITHUB_OUTPUT"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: dist/CHANGELOG.md

  source-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          mkdir -p dist
          tar -czf dist/pqCheck-source.tar.gz \
            --exclude=.git \
            --exclude=dist \
            --exclude=pqCheck \
            .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: dist/pqCheck-source.tar.gz

  packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - format: deb
            script: packaging/build-deb.sh
            artifact_name: pqcheck-deb
            package_glob: pqcheck_1.0.0_amd64.deb
          - format: rpm
            script: packaging/build-rpm.sh
            artifact_name: pqcheck-rpm
            package_glob: pqcheck-1.0.0-1.x86_64.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcap-dev libpq-dev libncurses-dev ruby-dev python3 tar gzip
          sudo gem install --no-document fpm

      - name: Build full-featured binary
        run: make -B WITH_LIBPQ=1 WITH_TUI=1

      - name: Build package
        run: bash ${{ matrix.script }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_glob }}

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - changelog
      - source-archive
      - packages

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/download

      - name: List release artifacts
        run: |
          find dist/download -type f | sort

      - name: Prepare release artifacts
        run: |
          mkdir -p dist/artifacts
          cp dist/download/source-archive/*.tar.gz dist/artifacts/ || true
          cp dist/download/pqcheck-deb/*.deb dist/artifacts/ || true
          cp dist/download/pqcheck-rpm/*.rpm dist/artifacts/ || true

      - name: Write release notes
        run: |
          mkdir -p dist
          cp dist/download/changelog/CHANGELOG.md dist/RELEASE_NOTES.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            dist/artifacts/pqCheck-source.tar.gz
            dist/artifacts/pqcheck_1.0.0_amd64.deb
            dist/artifacts/pqcheck-1.0.0-1.x86_64.rpm
          body_path: dist/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
